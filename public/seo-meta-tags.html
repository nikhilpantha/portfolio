/* SEO Meta Tags Configuration */ /* Add these to your HTML head tag for maximum
SEO impact */

<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Primary Keywords -->
<meta
  name="keywords"
  content="Nikhil Pantha, Full Stack Developer, React Developer, Next.js Developer, Frontend Developer, Web Developer Nepal, TypeScript Developer, JavaScript Developer, Web Development, Custom Web Solutions, Freelance Developer"
/>

<!-- Description with secondary keywords -->
<meta
  name="description"
  content="Nikhil Pantha is an award-winning Full Stack Developer and React specialist from Nepal with 4+ years of experience building high-performance web applications using Next.js, TypeScript, and modern technologies."
/>

<!-- Author and Creator -->
<meta name="author" content="Nikhil Pantha" />
<meta name="creator" content="Nikhil Pantha" />

<!-- Site-specific meta tags -->
<meta
  name="application-name"
  content="Nikhil Pantha - Full Stack Developer Portfolio"
/>
<meta name="apple-mobile-web-app-title" content="Nikhil Pantha" />

<!-- Geo and Location Tags -->
<meta name="geo.placename" content="Nepal" />
<meta name="geo.country" content="NP" />
<meta name="ICBM" content="27.7172,85.3240" />

<!-- Robots and Crawlers -->
<meta
  name="robots"
  content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
/>
<meta
  name="googlebot"
  content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
/>
<meta
  name="bingbot"
  content="index, follow, max-snippet:-1, max-image-preview:large"
/>
<meta name="revisit-after" content="7 days" />

<!-- Canonical URL -->
<link rel="canonical" href="http://nikhilpantha.com.np/" />

<!-- Alternate versions -->
<link rel="alternate" hreflang="en" href="http://nikhilpantha.com.np/" />
<link rel="alternate" hreflang="en-US" href="http://nikhilpantha.com.np/" />

<!-- Open Graph (Facebook, LinkedIn) -->
<meta property="og:type" content="website" />
<meta property="og:url" content="http://nikhilpantha.com.np/" />
<meta
  property="og:title"
  content="Nikhil Pantha | Full Stack Developer & React Specialist | Nepal"
/>
<meta
  property="og:description"
  content="Award-winning Full Stack Developer from Nepal specializing in React, Next.js, and modern web technologies. 4+ years experience, 50+ projects, 100% client satisfaction."
/>
<meta property="og:image" content="http://nikhilpantha.com.np/og-image.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Nikhil Pantha - Full Stack Developer" />
<meta property="og:locale" content="en_US" />
<meta property="og:site_name" content="Nikhil Pantha Portfolio" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:url" content="http://nikhilpantha.com.np/" />
<meta
  name="twitter:title"
  content="Nikhil Pantha | Full Stack Developer & React Specialist"
/>
<meta
  name="twitter:description"
  content="Full Stack Developer from Nepal specializing in React, Next.js, TypeScript. 50+ successful projects, 100% client satisfaction."
/>
<meta name="twitter:image" content="http://nikhilpantha.com.np/og-image.jpg" />
<meta name="twitter:creator" content="@nikhilpantha" />
<meta name="twitter:site" content="@nikhilpantha" />

<!-- Favicon and App Icons -->
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />

<!-- DNS Prefetch and Preconnect for Performance -->
<link rel="dns-prefetch" href="//www.google-analytics.com" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!-- Additional SEO Meta Tags -->
<meta name="format-detection" content="telephone=no,email=no,address=no" />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="light dark" />

<!-- Security Headers -->
<meta
  http-equiv="Strict-Transport-Security"
  content="max-age=31536000; includeSubDomains"
/>
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
<meta name="referrer" content="strict-origin-when-cross-origin" />

<!-- Performance Optimization -->
<link rel="preload" as="script" href="/main.js" />
<link rel="prefetch" href="/next-page.js" />
